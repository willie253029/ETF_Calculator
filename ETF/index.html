<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 槓桿再平衡計算器</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ETF計算器">
    <link rel="apple-touch-icon" href="icon-512.png">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 420px;
            margin: auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #00c6ff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }
        button:hover {
            background: #0099cc;
        }
        .result-box {
            margin-top: 22px;
            padding: 18px;
            background: rgba(255,255,255,0.12);
            border-radius: 14px;
            line-height: 1.8;
            display: none;
        }
        .alert-red {
            color: #ff7675;
            font-weight: bold;
        }
        .alert-green {
            color: #55efc4;
            font-weight: bold;
        }
        hr {
            border: 0;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin: 15px 0;
        }
        .footer {
            text-align: center;
            opacity: 0.7;
            margin-top: 18px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📈 ETF 槓桿再平衡計算器</h2>

    <div class="input-group">
        <label>初始總本金 (元)</label>
        <input type="number" id="capital" value="100000">
    </div>

    <div class="input-group">
        <label>目標總槓桿率</label>
        <input type="number" step="0.1" id="targetLeverage" value="1.5">
    </div>

    <div class="input-group">
        <label>比例偏移紅線 (%)</label>
        <input type="number" id="driftThreshold" value="5">
    </div>

    <div class="input-group">
        <label>模擬大盤漲跌幅 (%)</label>
        <input type="number" id="marketChange" value="10">
    </div>

    <button onclick="calculate()">計算再平衡</button>
    <div class="result-box" id="result"></div>
    <div class="footer">PWA ETF Calculator</div>
</div>

<script>
function calculate() {
    const capital = parseFloat(document.getElementById('capital').value);
    const leverage = parseFloat(document.getElementById('targetLeverage').value);
    const threshold = parseFloat(document.getElementById('driftThreshold').value);
    const marketChange = parseFloat(document.getElementById('marketChange').value) / 100;

    const w_2x = leverage - 1;
    const w_0050 = 2 - leverage;

    const val_0050 = capital * w_0050 * (1 + marketChange);
    const val_2x = capital * w_2x * (1 + marketChange * 2);

    const totalValue = val_0050 + val_2x;

    const new_w_0050_pct = (val_0050 / totalValue) * 100;
    const new_w_2x_pct = (val_2x / totalValue) * 100;
    const target_w_2x_pct = w_2x * 100;
    const drift = Math.abs(new_w_2x_pct - target_w_2x_pct);

    let actionHTML = "";

    if (drift >= threshold) {
        const target_0050_val = totalValue * w_0050;
        const target_2x_val = totalValue * w_2x;

        let diff_0050 = target_0050_val - val_0050;
        let diff_2x = target_2x_val - val_2x;

        actionHTML = `<div class="alert-red">⚠️ 已觸發再平衡</div>`;

        if (diff_2x < 0) {
            actionHTML += `
            🔹 賣出正二：${Math.abs(diff_2x).toFixed(0)} 元<br>
            🔹 買入0050：${Math.abs(diff_0050).toFixed(0)} 元`;
        } else {
            actionHTML += `
            🔹 賣出0050：${Math.abs(diff_0050).toFixed(0)} 元<br>
            🔹 買入正二：${Math.abs(diff_2x).toFixed(0)} 元`;
        }
    } else {
        actionHTML = `<div class="alert-green">✅ 未達偏移紅線 (${drift.toFixed(2)}%)</div>`;
    }

    const resultDiv = document.getElementById('result');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `
        <b>【波動後資產】</b><br>
        總市值：${totalValue.toFixed(0)} 元<br>
        0050：${val_0050.toFixed(0)} 元 (${new_w_0050_pct.toFixed(1)}%)<br>
        正二：${val_2x.toFixed(0)} 元 (${new_w_2x_pct.toFixed(1)}%)<br>
        偏移量：${drift.toFixed(2)}%<br>
        <hr>
        ${actionHTML}
    `;
}

// 註冊 Service Worker，並明確指定相對路徑
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker 註冊成功！ Scope 是: ', reg.scope))
            .catch(err => console.log('Service Worker 註冊失敗: ', err));
    });
}
</script>
</body>
</html>
